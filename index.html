<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jujutsu: Cursed Domain</title>
    <style>
        body { margin: 0; overflow: hidden; background: #03030f; font-family: monospace; user-select: none; -webkit-user-select: none; }
        #ui { position: absolute; top: 15px; left: 15px; color: #00ffff; font-size: 18px; font-weight: bold; text-shadow: 2px 2px #000; z-index: 10; }
        #txt-bajas { color: #ff0055; margin-top: 5px; }
        #controles { position: absolute; bottom: 35px; left: 0; width: 100%; display: flex; justify-content: space-around; align-items: center; z-index: 10; pointer-events: none; }
        .pad-row { display: flex; justify-content: center; gap: 8px; margin: 4px 0; }
        .btn-pad { width: 70px; height: 70px; background: rgba(255,255,255,0.15); border: 2px solid #00ffff; border-radius: 50%; color: #00ffff; font-weight: bold; font-size: 24px; display: flex; justify-content: center; align-items: center; pointer-events: auto; }
        #btn-ataque { width: 95px; height: 95px; background: #ff0055; border-radius: 50%; border: 2px solid #fff; font-weight: bold; font-size: 14px; color: white; box-shadow: 0 0 20px #ff0055; pointer-events: auto; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    </style>
</head>
<body>

    <div id="ui">
        <div>ENERGÍA MALDITA: <span id="txt-energia">100</span>%</div>
        <div id="txt-bajas">MALDICIONES: <span id="bajas">0</span></div>
    </div>
    
    <div id="controles">
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="pad-row"><div class="btn-pad" id="btn-w">↑</div></div>
            <div class="pad-row"><div class="btn-pad" id="btn-a">←</div><div style="width:70px"></div><div class="btn-pad" id="btn-d">→</div></div>
            <div class="pad-row"><div class="btn-pad" id="btn-s">↓</div></div>
        </div>
        <button id="btn-ataque">KOKUSEN</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // VARIABLES DEL JUEGO
        let jugador = { x: 0, z: 0, color: '#0088ff', size: 30 };
        let energia = 100;
        let bajas = 0;
        let maldiciones = [];
        let proyectiles = [];
        let destelloEfecto = 0;

        const teclas = { w: false, a: false, s: false, d: false };

        // Vincular controles táctiles
        function vincular(id, tecla) {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); teclas[tecla] = true; });
            el.addEventListener('touchend', (e) => { e.preventDefault(); teclas[tecla] = false; });
        }
        vincular('btn-w', 'w');
        vincular('btn-a', 'a');
        vincular('btn-s', 's');
        vincular('btn-d', 'd');

        // Botón de Ataque Kokusen
        document.getElementById('btn-ataque').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (energia >= 30) {
                energia -= 30;
                destelloEfecto = 5; // Activa flash rojo de impacto

                // Disparar proyectil hacia adelante
                let dx = 0, dz = -1;
                if (teclas.a) dx = -1;
                if (teclas.d) dx = 1;
                if (teclas.w) dz = -1;
                if (teclas.s) dz = 1;
                
                proyectiles.push({ x: jugador.x, z: jugador.z, dx: dx, dz: dz });
            }
        });

        // Recarga de energía
        setInterval(() => {
            if (energia < 100) {
                energia = Math.min(energia + 4, 100);
                document.getElementById('txt-energia').innerText = energia;
            }
        }, 300);

        // Generar maldiciones cada 2 segundos
        setInterval(() => {
            if (maldiciones.length < 8) {
                let ang = Math.random() * Math.PI * 2;
                maldiciones.push({
                    x: jugador.x + Math.cos(ang) * 300,
                    z: jugador.z + Math.sin(ang) * 300
                });
            }
        }, 200);

        // BUCLE PRINCIPAL DE GRÁFICOS NATIIVOS
        function loop() {
            // Actualizar posiciones
            if (teclas.w) jugador.z -= 4;
            if (teclas.s) jugador.z += 4;
            if (teclas.a) jugador.x -= 4;
            if (teclas.d) jugador.x += 4;

            // Mover proyectiles
            for (let i = proyectiles.length - 1; i >= 0; i--) {
                let p = proyectiles[i];
                if (p.dx === 0 && p.dz === 0) p.dz = -1;
                p.x += p.dx * 12;
                p.z += p.dz * 12;

                // Destruir proyectil si se aleja
                if (Math.abs(p.x - jugador.x) > 400 || Math.abs(p.z - jugador.z) > 400) {
                    proyectiles.splice(i, 1);
                }
            }

            // Mover Maldiciones (IA de persecución)
            for (let i = maldiciones.length - 1; i >= 0; i--) {
                let m = maldiciones[i];
                let dist = Math.hypot(jugador.x - m.x, jugador.z - m.z);
                if (dist > 5) {
                    m.x += ((jugador.x - m.x) / dist) * 2;
                    m.z += ((jugador.z - m.z) / dist) * 2;
                }

                // Colisión proyectil - maldición
                for (let j = proyectiles.length - 1; j >= 0; j--) {
                    let p = proyectiles[j];
                    if (Math.hypot(p.x - m.x, p.z - m.z) < 25) {
                        maldiciones.splice(i, 1);
                        proyectiles.splice(j, 1);
                        bajas++;
                        document.getElementById('bajas').innerText = bajas;
                        break;
                    }
                }
            }

            // DIBUJAR TODO EN PANTALLA
            ctx.fillStyle = destelloEfecto > 0 ? '#ff0033' : '#04040f';
            if (destelloEfecto > 0) destelloEfecto--;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Centro de la pantalla para la cámara fija en tercera persona
            let cx = canvas.width / 2;
            let cy = canvas.height / 2 + 100;

            // Dibujar cuadrícula del piso
            ctx.strokeStyle = '#151535';
            ctx.lineWidth = 1;
            for (let i = -10; i <= 10; i++) {
                // Líneas horizontales y verticales simulando perspectiva 3D
                ctx.beginPath();
                ctx.moveTo(0, cy + i * 30);
                ctx.lineTo(canvas.width, cy + i * 30);
                ctx.stroke();
            }

            // Dibujar Proyectiles (Destellos de energía)
            ctx.fillStyle = '#ff0055';
            proyectiles.forEach(p => {
                let scrX = cx + (p.x - jugador.x);
                let scrY = cy + (p.z - jugador.z) * 0.7; // Factor de perspectiva vertical
                ctx.beginPath();
                ctx.arc(scrX, scrY, 10, 0, Math.PI * 2);
                ctx.fill();
            });

            // Dibujar Maldiciones Enemigas (Cubos Rojos)
            ctx.fillStyle = '#990000';
            maldiciones.forEach(m => {
                let scrX = cx + (m.x - jugador.x) - 12;
                let scrY = cy + (m.z - jugador.z) * 0.7 - 25;
                ctx.fillRect(scrX, scrY, 25, 35);
                ctx.strokeStyle = '#ff0000';
                ctx.strokeRect(scrX, scrY, 25, 35);
            });

            // Dibujar Hechicero (Cubo Azul Eléctrico central)
            ctx.fillStyle = '#0088ff';
            ctx.fillRect(cx - 15, cy - 40, 30, 45);
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 2;
            ctx.strokeRect(cx - 15, cy - 40, 30, 45);

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
